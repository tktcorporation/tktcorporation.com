<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>tkt - Web Application Developer</title>
    <meta
      name="description"
      content="Hi, I'm tkt. I'm a web application developer from Japan."
    />

    <!-- Preconnect: 外部リソースへの接続を事前に確立し初回ロードを高速化 -->
    <link rel="preconnect" href="https://www.googletagmanager.com" />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link rel="dns-prefetch" href="https://www.google-analytics.com" />

    <!-- OGP / Twitter Card -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="tkt - Web Application Developer" />
    <meta
      property="og:description"
      content="Hi, I'm tkt. I'm a web application developer from Japan."
    />
    <meta property="og:url" content="https://tktcorporation.com" />
    <meta property="og:site_name" content="tktcorporation.com" />
    <meta property="og:locale" content="ja_JP" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="tkt - Web Application Developer" />
    <meta
      name="twitter:description"
      content="Hi, I'm tkt. I'm a web application developer from Japan."
    />

    <link rel="icon" href="/favicon.ico" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/devicons/devicon@v2.15.1/devicon.min.css"
    />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Handle redirect from 404.html for GitHub Pages SPA
      (function () {
        try {
          var l = window.location;
          if (l.search[1] === "/") {
            var decoded = l.search
              .slice(1)
              .split("&")
              .map(function (s) {
                return s.replace(/~and~/g, "&");
              })
              .join("?");

            // Validate decoded URL format before applying
            var newPath = l.pathname.slice(0, -1) + decoded + l.hash;
            if (newPath && newPath.length > 0) {
              window.history.replaceState(null, null, newPath);
            }
          }
        } catch (e) {
          // Silently fail if URL decoding fails - let React Router handle the original URL
          console.warn("SPA redirect failed:", e);
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
